<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ Карта Средиземья - LOTR Strategy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #f5e6c8;
            --parchment-dark: #e8d4a8;
            --parchment-shadow: #c9b896;
            --ink: #2c1810;
            --ink-light: #4a3428;
            --gold: #c9a227;
            --gold-bright: #e8c547;
            --gold-dark: #8b6914;
            --crimson: #8b0000;
            --forest: #1b4d1b;
            --ocean: #1e3a5f;
            --shadow: rgba(44, 24, 16, 0.4);
            --shadow-heavy: rgba(44, 24, 16, 0.7);
            
            /* Faction Colors */
            --angmar: #4a0e4a;
            --gondor: #1e3a5f;
            --mordor: #8b0000;
            --rohan: #006400;
            --isengard: #2f4f4f;
            --lorien: #228b22;
            --dale: #4169e1;
            --rhovanion: #daa520;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cinzel', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: var(--parchment);
            overflow: hidden;
        }
        
        #app { display: flex; height: 100vh; }
        
        /* === SIDEBAR - Parchment Style === */
        #sidebar {
            width: 320px;
            background: 
                linear-gradient(180deg, var(--parchment) 0%, var(--parchment-dark) 100%),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /></filter><rect width="100%25" height="100%25" filter="url(%23noise)" opacity="0.08"/></svg>');
            color: var(--ink);
            border-right: 3px solid var(--gold-dark);
            box-shadow: 
                4px 0 20px var(--shadow-heavy),
                inset -2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            position: relative;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold) var(--parchment-dark);
        }
        
        #sidebar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(139, 105, 20, 0.03) 2px,
                    rgba(139, 105, 20, 0.03) 4px
                );
            pointer-events: none;
        }
        
        /* Header with Ornament */
        #sidebar-header {
            padding: 20px;
            background: linear-gradient(180deg, var(--gold-dark) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            color: var(--parchment);
            text-align: center;
            border-bottom: 3px double var(--ink);
            box-shadow: 0 4px 15px var(--shadow-heavy);
            position: relative;
        }
        
        #sidebar-header::before,
        #sidebar-header::after {
            content: '❦';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            opacity: 0.5;
        }
        
        #sidebar-header::before { left: 15px; }
        #sidebar-header::after { right: 15px; }
        
        #sidebar-header h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.3rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px var(--shadow-heavy);
        }
        
        #sidebar-header p {
            font-size: 0.7rem;
            opacity: 0.9;
            margin-top: 5px;
            font-style: italic;
        }
        
        /* Sections */
        .sidebar-section {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(139, 105, 20, 0.3);
            position: relative;
        }
        
        .sidebar-section-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 0.75rem;
            color: var(--gold-dark);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }
        
        .sidebar-section-title::before {
            content: '⚜';
            font-size: 1rem;
        }
        
        /* Metal Buttons */
        .btn {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 2px solid var(--gold-dark);
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, 
                #d4af37 0%, 
                #c9a227 30%, 
                #b8941d 50%, 
                #8b6914 100%);
            color: var(--ink);
            text-shadow: 0 1px 1px rgba(255,255,255,0.3);
            box-shadow: 
                inset 0 1px 0 rgba(255,255,255,0.4),
                0 4px 6px var(--shadow);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                inset 0 1px 0 rgba(255,255,255,0.5),
                0 6px 12px var(--shadow-heavy),
                0 0 20px rgba(201, 162, 39, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .btn-danger {
            background: linear-gradient(180deg, 
                #cc4444 0%, 
                #aa3333 50%, 
                #882222 100%);
            border-color: #661111;
            color: var(--parchment);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        
        /* Map Container */
        #map-container {
            flex: 1;
            position: relative;
            background: #0a1628;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
        
        /* Custom Scrollbar */
        #sidebar::-webkit-scrollbar {
            width: 8px;
        }
        
        #sidebar::-webkit-scrollbar-track {
            background: var(--parchment-dark);
        }
        
        #sidebar::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--gold), var(--gold-dark));
            border-radius: 4px;
        }
        
        /* Faction Legend */
        .legend-item {
            display: flex;
            align-items: center;
            padding: 6px 0;
            font-size: 0.75rem;
            border-bottom: 1px dotted rgba(139, 105, 20, 0.2);
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 10px;
            border: 2px solid var(--ink);
            box-shadow: 0 0 4px var(--shadow);
        }
        
        /* Loading Screen */
        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }
        
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-ornament {
            font-size: 4rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        #loading-text {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.5rem;
            margin-top: 20px;
            letter-spacing: 3px;
        }
        
        /* Map Controls Styling */
        .leaflet-control-zoom a {
            background: var(--parchment) !important;
            color: var(--ink) !important;
            border: 1px solid var(--gold-dark) !important;
        }
        
        .leaflet-control-zoom a:hover {
            background: var(--gold) !important;
        }
        
        /* Custom Popups */
        .leaflet-popup-content-wrapper {
            background: var(--parchment);
            border: 2px solid var(--gold-dark);
            box-shadow: 0 4px 20px var(--shadow-heavy);
            font-family: 'Cinzel', serif;
        }
        
        .leaflet-popup-content {
            color: var(--ink);
            margin: 12px;
        }
        
        .leaflet-popup-tip {
            background: var(--parchment);
            border: 1px solid var(--gold-dark);
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading">
        <div class="loading-ornament">⚔️</div>
        <div id="loading-text">Загрузка Карты Средиземья...</div>
    </div>

    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <header id="sidebar-header">
                <h1>⚔️ Карта Средиземья</h1>
                <p>Стратегический командный центр</p>
            </header>
            
            <div class="sidebar-section">
                <div class="sidebar-section-title">Управление</div>
                <button class="btn" id="toggle-roads">🛤️ Дороги</button>
                <button class="btn" id="toggle-waypoints">📍 Точки</button>
                <button class="btn" id="reset-view">🔄 Сброс вида</button>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-section-title">Отряды</div>
                <button class="btn btn-danger" id="clear-units">❌ Очистить все отряды</button>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-section-title">Фракции</div>
                <div id="faction-legend"></div>
            </div>
        </aside>
        
        <!-- Map -->
        <main id="map-container">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -5,
            maxZoom: 4,
            attributionControl: false
        });
        
        // Add custom parchment-style tiles (placeholder - in real app use your tile source)
        const bounds = [[-90, -180], [90, 180]];
        L.rectangle(bounds, {
            color: '#1e3a5f',
            weight: 2,
            fillColor: '#16213e',
            fillOpacity: 0.8
        }).addTo(map);
        
        map.fitBounds(bounds);
        
        // Faction colors
        const factionColors = {
            'ANGMAR': '#4a0e4a',
            'GONDOR': '#1e3a5f',
            'MORDOR': '#8b0000',
            'ROHAN': '#006400',
            'ISENGARD': '#2f4f4f',
            'LOTHLORIEN': '#228b22',
            'DALE': '#4169e1',
            'DURINS_FOLK': '#8b7355',
            'HIGH_ELF': '#87ceeb',
            'WOOD_ELF': '#228b22',
            'BREE': '#8fbc8f',
            'HOBBIT': '#90ee90',
            'RANGER_NORTH': '#2f4f4f',
            'GUNDABAD': '#4a4a4a',
            'NEAR_HARAD': '#daa520',
            'MORWAITH': '#8b4513',
            'TAURETHRIM': '#006400',
            'HALF_TROLL': '#800080',
            'FACELESS': '#696969'
        };
        
        // Create faction legend
        const legendContainer = document.getElementById('faction-legend');
        Object.entries(factionColors).forEach(([faction, color]) => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = `
                <div class="legend-color" style="background: ${color}"></div>
                <span>${faction.replace(/_/g, ' ')}</span>
            `;
            legendContainer.appendChild(item);
        });
        
        // Loading screen hide
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 1500);
        
        // Button handlers
        document.getElementById('reset-view').addEventListener('click', () => {
            map.fitBounds(bounds);
        });
        
        // In real implementation, load waypoints.json and roads.json here
        console.log('Map initialized - ready for data loading');
    </script>
</body>
</html>
