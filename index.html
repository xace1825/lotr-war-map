<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Средиземья - LOTR Server</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cinzel', serif;
            background: #1a1a2e;
            color: #e8e8e8;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        #sidebar {
            width: 320px;
            background: linear-gradient(180deg, #16213e 0%, #0f0f23 100%);
            border-right: 2px solid #c9a227;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        }

        #sidebar-header {
            padding: 20px;
            background: linear-gradient(180deg, #c9a227 0%, #8b6914 100%);
            color: #1a1a2e;
            text-align: center;
        }

        #sidebar-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        #sidebar-header p {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* Controls */
        .controls {
            padding: 15px;
            border-bottom: 1px solid rgba(201, 162, 39, 0.3);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .toggle-label {
            font-size: 0.9rem;
            color: #c9a227;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #2d2d4a;
            transition: 0.3s;
            border-radius: 30px;
            border: 2px solid #c9a227;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 2px;
            bottom: 2px;
            background-color: #c9a227;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #c9a227;
        }

        input:checked + .slider:before {
            transform: translateX(30px);
            background-color: #1a1a2e;
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-clear {
            background: linear-gradient(180deg, #8b0000 0%, #5c0000 100%);
            color: #fff;
            border: 1px solid #ff4444;
        }

        .btn-clear:hover {
            background: linear-gradient(180deg, #a00000 0%, #700000 100%);
        }

        /* Markers List */
        #markers-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        #markers-list::-webkit-scrollbar {
            width: 6px;
        }

        #markers-list::-webkit-scrollbar-track {
            background: #0f0f23;
        }

        #markers-list::-webkit-scrollbar-thumb {
            background: #c9a227;
            border-radius: 3px;
        }

        .marker-item {
            background: rgba(201, 162, 39, 0.1);
            border: 1px solid rgba(201, 162, 39, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .marker-item:hover {
            background: rgba(201, 162, 39, 0.2);
            transform: translateX(5px);
        }

        .marker-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .faction-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .marker-name {
            flex: 1;
            font-weight: bold;
            font-size: 0.9rem;
            color: #e8e8e8;
        }

        .marker-troops {
            font-size: 0.8rem;
            color: #c9a227;
        }

        .marker-coords {
            font-size: 0.7rem;
            color: #888;
        }

        .marker-actions {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .btn-delete {
            flex: 1;
            padding: 6px;
            background: rgba(139, 0, 0, 0.3);
            border: 1px solid #ff4444;
            color: #ff8888;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: rgba(139, 0, 0, 0.6);
        }

        /* Map */
        #map {
            flex: 1;
            height: 100%;
        }

        .leaflet-container {
            background: #02598D !important;
        }

        /* Leaflet Popup Styling */
        .leaflet-popup-content-wrapper {
            background: linear-gradient(180deg, #16213e 0%, #0f0f23 100%);
            border: 2px solid #c9a227;
            border-radius: 10px;
            color: #e8e8e8;
        }

        .leaflet-popup-tip {
            background: #c9a227;
        }

        .leaflet-popup-content {
            font-family: 'Cinzel', serif;
            margin: 15px !important;
            min-width: 250px;
        }

        .popup-title {
            color: #c9a227;
            font-size: 1rem;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 700;
        }

        .popup-field {
            margin-bottom: 12px;
        }

        .popup-field label {
            display: block;
            font-size: 0.8rem;
            color: #c9a227;
            margin-bottom: 5px;
        }

        .popup-field select,
        .popup-field input {
            width: 100%;
            padding: 8px;
            border: 1px solid #c9a227;
            border-radius: 5px;
            background: #1a1a2e;
            color: #e8e8e8;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
        }

        .popup-field select:focus,
        .popup-field input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(201, 162, 39, 0.3);
        }

        .btn-add {
            width: 100%;
            padding: 10px;
            background: linear-gradient(180deg, #c9a227 0%, #8b6914 100%);
            border: none;
            border-radius: 5px;
            color: #1a1a2e;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add:hover {
            background: linear-gradient(180deg, #ffd700 0%, #c9a227 100%);
            transform: scale(1.02);
        }

        .btn-cancel {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #666;
            border-radius: 5px;
            color: #888;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            border-color: #888;
            color: #e8e8e8;
        }

        /* Custom Marker Icons */
        .custom-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 3px solid #c9a227;
            box-shadow: 0 0 15px rgba(201, 162, 39, 0.5);
            font-weight: bold;
            font-size: 0.8rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Predefined markers have a star and golden border */
        .predefined-marker {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            animation: star-pulse 3s infinite;
        }

        @keyframes star-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.8); }
        }

        .custom-marker .troop-count {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #c9a227;
            color: #1a1a2e;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 0.65rem;
            font-weight: bold;
            border: 2px solid #1a1a2e;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        /* Edit mode indicator */
        .edit-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            background: linear-gradient(180deg, #c9a227 0%, #8b6914 100%);
            color: #1a1a2e;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.5);
            display: none;
        }

        .edit-indicator.active {
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(201, 162, 39, 0.5); }
            50% { box-shadow: 0 0 30px rgba(201, 162, 39, 0.8); }
        }

        /* Faction colors for markers */
        .faction-gondor { background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 100%); }
        .faction-rohan { background: linear-gradient(135deg, #2d5016 0%, #1a3009 100%); }
        .faction-mordor { background: linear-gradient(135deg, #4a0e0e 0%, #1a0404 100%); }
        .faction-isengard { background: linear-gradient(135deg, #2d2d2d 0%, #0f0f0f 100%); }
        .faction-high-elf { background: linear-gradient(135deg, #4a4a8a 0%, #1a1a3a 100%); }
        .faction-wood-elf { background: linear-gradient(135deg, #3d5c2e 0%, #1a2d14 100%); }
        .faction-lothlorien { background: linear-gradient(135deg, #d4a574 0%, #8b6914 100%); }
        .faction-dol-guldur { background: linear-gradient(135deg, #2d1a4a 0%, #0f081a 100%); }
        .faction-dale { background: linear-gradient(135deg, #5c4a1e 0%, #2d250f 100%); }
        .faction-dunland { background: linear-gradient(135deg, #4a3a2a 0%, #1a1510 100%); }
        .faction-rhudaur { background: linear-gradient(135deg, #3a3a4a 0%, #15151a 100%); }
        .faction-ranger-north { background: linear-gradient(135deg, #2a3a3a 0%, #101515 100%); }
        .faction-bree { background: linear-gradient(135deg, #5c5c3a 0%, #2d2d1a 100%); }
        .faction-hobbit { background: linear-gradient(135deg, #4a5c2a 0%, #1a2d10 100%); }
        .faction-dorwinion { background: linear-gradient(135deg, #5c2a4a 0%, #2d101a 100%); }
        .faction-near-harad { background: linear-gradient(135deg, #8b4a1a 0%, #4a250d 100%); }
        .faction-angmar { background: linear-gradient(135deg, #3a3a5c 0%, #15152d 100%); }
        .faction-gundabad { background: linear-gradient(135deg, #4a4a3a 0%, #1a1a15 100%); }
        .faction-durins-folk { background: linear-gradient(135deg, #5c5c5c 0%, #2d2d2d 100%); }
        .faction-fangorn { background: linear-gradient(135deg, #2d4a2a 0%, #102d10 100%); }
    </style>
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <div id="sidebar-header">
                <h1>🗺️ Карта Средиземья</h1>
                <p>Enchald LOTR Server</p>
            </div>
            <div class="controls">
                <div class="toggle-container">
                    <span class="toggle-label">Режим редактирования</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="edit-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <button class="btn btn-clear" id="clear-all-btn">🗑️ Очистить все маркеры</button>
            </div>
            <div id="markers-list">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    <p>Нет маркеров</p>
                    <p style="font-size: 0.8rem; margin-top: 5px;">Включите режим редактирования и кликните на карту</p>
                </div>
            </div>
        </div>
        <div id="map"></div>
    </div>
    <div class="edit-indicator" id="edit-indicator">✏️ Режим редактирования</div>

            const iconHtml = `

            markers = markers.filter(m => m.id !== id);
            saveMarkers();

                    </div>
                `;
            }).join('');
        }

        function focusMarker(id) {
            const marker = markers.find(m => m.id === id);
            if (marker && leafletMarkers[id]) {
                map.setView([marker.lat, marker.lng], 5);
                leafletMarkers[id].openPopup();
            }
        }

        function saveMarkers() {
            localStorage.setItem('lotr-markers', JSON.stringify(markers));
        }

        function loadMarkers() {
            const saved = localStorage.getItem('lotr-markers');
            if (saved) {
                try {
                    markers = JSON.parse(saved);
                    markers.forEach(m => createLeafletMarker(m));
                } catch (e) {
                    console.error('Failed to load markers:', e);
                    markers = [];
                }
            }
            // Load predefined waypoints from server
            loadPredefinedWaypoints();
        }

        // Load predefined waypoints from server
        async function loadPredefinedWaypoints() {
            try {
                const response = await fetch('https://maplotr.enchald.com/js/data.js');
                const text = await response.text();
                const jsonStr = text.replace('var lotrData = ', '').replace(/;$/, '');
                const data = JSON.parse(jsonStr);

                if (data.waypoints) {
                    const waypoints = data.waypoints;
                    console.log(`Loaded ${Object.keys(waypoints).length} predefined waypoints`);

                    for (const [id, wp] of Object.entries(waypoints)) {
                        if (wp.coords && wp.coords.length >= 2) {
                            const mcX = wp.coords[0];
                            const mcZ = wp.coords[1];
                            // Convert Minecraft coords to Leaflet Simple CRS
                            // At zoom 7: lat = -mcZ / 256, lng = mcX / 256
                            // At current zoom 3: divide by 4 more
                            const lat = -mcZ / 1024;
                            const lng = mcX / 1024;

                            const predefinedMarker = {
                                id: `wp_${id}`,
                                lat: lat,
                                lng: lng,
                                name: wp.name || id,
                                faction: wp.faction,
                                desc: wp.desc || '',
                                isPredefined: true
                            };

                            createPredefinedMarker(predefinedMarker);
                        }
                    }
                }
            } catch (e) {
                console.error('Failed to load predefined waypoints:', e);
            }
        }

        // Create a predefined marker (non-deletable by user)
        function createPredefinedMarker(marker) {
            // Find faction for styling
            const faction = FACTIONS.find(f => f.id === marker.faction);
            const factionClass = faction ? `faction-${faction.id.toLowerCase().replace('_', '-')}` : '';

            // Create custom icon - different style for predefined markers
            const iconHtml = `
                <div class="custom-marker predefined-marker ${factionClass}" style="width: 28px; height: 28px; border-color: #ffd700;">
                    ★
                </div>
            `;

            const customIcon = L.divIcon({
                html: iconHtml,
                className: 'custom-marker-container',
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });

            const leafletMarker = L.marker([marker.lat, marker.lng], { icon: customIcon })
                .addTo(map);
    addWaypointsToMap(map);

            // Create popup with waypoint info
            const factionName = faction ? faction.name : (marker.faction || 'Нет фракции');
            const popupContent = `
                <div class="popup-title">${marker.name}</div>
                <div style="text-align: center;">
                    <div style="color: #c9a227; margin-bottom: 8px;">${factionName}</div>
                    ${marker.desc ? `<div style="font-size: 0.85rem; margin-bottom: 8px; color: #ccc;">${marker.desc}</div>` : ''}
                    <div style="font-size: 0.75rem; color: #666;">
                        📍 Координаты: ${Math.round(marker.lat)}, ${Math.round(marker.lng)}
                    </div>
                </div>
            `;

            leafletMarker.bindPopup(popupContent);
            predefinedMarkers[marker.id] = leafletMarker;
        }

        function setupEventListeners() {
            // Edit mode toggle
            document.getElementById('edit-toggle').addEventListener('change', (e) => {
                editMode = e.target.checked;
                const indicator = document.getElementById('edit-indicator');
                indicator.classList.toggle('active', editMode);

                // Change cursor based on mode
                document.getElementById('map').style.cursor = editMode ? 'crosshair' : 'grab';
            });

            // Clear all button
            document.getElementById('clear-all-btn').addEventListener('click', clearAllMarkers);

            // Make functions globally available
            window.deleteMarker = deleteMarker;
            window.focusMarker = focusMarker;
        }

        // Start
        init();
    </script>
</body>
</html>
