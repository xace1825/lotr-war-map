<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта Средиземья - LOTR Server</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cinzel', serif;
            background: #1a1a2e;
            color: #e8e8e8;
            overflow: hidden;
        }

        #app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        #sidebar {
            width: 320px;
            background: linear-gradient(180deg, #16213e 0%, #0f0f23 100%);
            border-right: 2px solid #c9a227;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        }

        #sidebar-header {
            padding: 20px;
            background: linear-gradient(180deg, #c9a227 0%, #8b6914 100%);
            color: #1a1a2e;
            text-align: center;
        }

        #sidebar-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        #sidebar-header p {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        /* Controls */
        .controls {
            padding: 15px;
            border-bottom: 1px solid rgba(201, 162, 39, 0.3);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .toggle-label {
            font-size: 0.9rem;
            color: #c9a227;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #2d2d4a;
            transition: 0.3s;
            border-radius: 30px;
            border: 2px solid #c9a227;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 2px;
            bottom: 2px;
            background-color: #c9a227;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #c9a227;
        }

        input:checked + .slider:before {
            transform: translateX(30px);
            background-color: #1a1a2e;
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-clear {
            background: linear-gradient(180deg, #8b0000 0%, #5c0000 100%);
            color: #fff;
            border: 1px solid #ff4444;
        }

        .btn-clear:hover {
            background: linear-gradient(180deg, #a00000 0%, #700000 100%);
        }

        /* Markers List */
        #markers-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        #markers-list::-webkit-scrollbar {
            width: 6px;
        }

        #markers-list::-webkit-scrollbar-track {
            background: #0f0f23;
        }

        #markers-list::-webkit-scrollbar-thumb {
            background: #c9a227;
            border-radius: 3px;
        }

        .marker-item {
            background: rgba(201, 162, 39, 0.1);
            border: 1px solid rgba(201, 162, 39, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .marker-item:hover {
            background: rgba(201, 162, 39, 0.2);
            transform: translateX(5px);
        }

        .marker-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .faction-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .marker-name {
            flex: 1;
            font-weight: bold;
            font-size: 0.9rem;
            color: #e8e8e8;
        }

        .marker-troops {
            font-size: 0.8rem;
            color: #c9a227;
        }

        .marker-coords {
            font-size: 0.7rem;
            color: #888;
        }

        .marker-actions {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .btn-delete {
            flex: 1;
            padding: 6px;
            background: rgba(139, 0, 0, 0.3);
            border: 1px solid #ff4444;
            color: #ff8888;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: rgba(139, 0, 0, 0.6);
        }

        /* Map */
        #map {
            flex: 1;
            height: 100%;
        }

        .leaflet-container {
            background: #02598D !important;
        }

        /* Leaflet Popup Styling */
        .leaflet-popup-content-wrapper {
            background: linear-gradient(180deg, #16213e 0%, #0f0f23 100%);
            border: 2px solid #c9a227;
            border-radius: 10px;
            color: #e8e8e8;
        }

        .leaflet-popup-tip {
            background: #c9a227;
        }

        .leaflet-popup-content {
            font-family: 'Cinzel', serif;
            margin: 15px !important;
            min-width: 250px;
        }

        .popup-title {
            color: #c9a227;
            font-size: 1rem;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 700;
        }

        .popup-field {
            margin-bottom: 12px;
        }

        .popup-field label {
            display: block;
            font-size: 0.8rem;
            color: #c9a227;
            margin-bottom: 5px;
        }

        .popup-field select,
        .popup-field input {
            width: 100%;
            padding: 8px;
            border: 1px solid #c9a227;
            border-radius: 5px;
            background: #1a1a2e;
            color: #e8e8e8;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
        }

        .popup-field select:focus,
        .popup-field input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(201, 162, 39, 0.3);
        }

        .btn-add {
            width: 100%;
            padding: 10px;
            background: linear-gradient(180deg, #c9a227 0%, #8b6914 100%);
            border: none;
            border-radius: 5px;
            color: #1a1a2e;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add:hover {
            background: linear-gradient(180deg, #ffd700 0%, #c9a227 100%);
            transform: scale(1.02);
        }

        .btn-cancel {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #666;
            border-radius: 5px;
            color: #888;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            border-color: #888;
            color: #e8e8e8;
        }

        /* Custom Marker Icons */
        .custom-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 3px solid #c9a227;
            box-shadow: 0 0 15px rgba(201, 162, 39, 0.5);
            font-weight: bold;
            font-size: 0.8rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .custom-marker .troop-count {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #c9a227;
            color: #1a1a2e;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 0.65rem;
            font-weight: bold;
            border: 2px solid #1a1a2e;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        /* Edit mode indicator */
        .edit-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            background: linear-gradient(180deg, #c9a227 0%, #8b6914 100%);
            color: #1a1a2e;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.5);
            display: none;
        }

        .edit-indicator.active {
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(201, 162, 39, 0.5); }
            50% { box-shadow: 0 0 30px rgba(201, 162, 39, 0.8); }
        }

        /* Faction colors for markers */
        .faction-gondor { background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 100%); }
        .faction-rohan { background: linear-gradient(135deg, #2d5016 0%, #1a3009 100%); }
        .faction-mordor { background: linear-gradient(135deg, #4a0e0e 0%, #1a0404 100%); }
        .faction-isengard { background: linear-gradient(135deg, #2d2d2d 0%, #0f0f0f 100%); }
        .faction-high-elf { background: linear-gradient(135deg, #4a4a8a 0%, #1a1a3a 100%); }
        .faction-wood-elf { background: linear-gradient(135deg, #3d5c2e 0%, #1a2d14 100%); }
        .faction-lothlorien { background: linear-gradient(135deg, #d4a574 0%, #8b6914 100%); }
        .faction-dol-guldur { background: linear-gradient(135deg, #2d1a4a 0%, #0f081a 100%); }
        .faction-dale { background: linear-gradient(135deg, #5c4a1e 0%, #2d250f 100%); }
        .faction-dunland { background: linear-gradient(135deg, #4a3a2a 0%, #1a1510 100%); }
        .faction-rhudaur { background: linear-gradient(135deg, #3a3a4a 0%, #15151a 100%); }
        .faction-ranger-north { background: linear-gradient(135deg, #2a3a3a 0%, #101515 100%); }
        .faction-bree { background: linear-gradient(135deg, #5c5c3a 0%, #2d2d1a 100%); }
        .faction-hobbit { background: linear-gradient(135deg, #4a5c2a 0%, #1a2d10 100%); }
        .faction-dorwinion { background: linear-gradient(135deg, #5c2a4a 0%, #2d101a 100%); }
        .faction-near-harad { background: linear-gradient(135deg, #8b4a1a 0%, #4a250d 100%); }
        .faction-angmar { background: linear-gradient(135deg, #3a3a5c 0%, #15152d 100%); }
        .faction-gundabad { background: linear-gradient(135deg, #4a4a3a 0%, #1a1a15 100%); }
        .faction-durins-folk { background: linear-gradient(135deg, #5c5c5c 0%, #2d2d2d 100%); }
        .faction-fangorn { background: linear-gradient(135deg, #2d4a2a 0%, #102d10 100%); }
    </style>
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <div id="sidebar-header">
                <h1>🗺️ Карта Средиземья</h1>
                <p>Enchald LOTR Server</p>
            </div>
            <div class="controls">
                <div class="toggle-container">
                    <span class="toggle-label">Режим редактирования</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="edit-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <button class="btn btn-clear" id="clear-all-btn">🗑️ Очистить все маркеры</button>
            </div>
            <div id="markers-list">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    <p>Нет маркеров</p>
                    <p style="font-size: 0.8rem; margin-top: 5px;">Включите режим редактирования и кликните на карту</p>
                </div>
            </div>
        </div>
        <div id="map"></div>
    </div>
    <div class="edit-indicator" id="edit-indicator">✏️ Режим редактирования</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
        // === WAYPOINTS LOADER ===
        function loadWaypoints() {
            fetch('waypoints.json')
                .then(r => r.json())
                .then(data => {
                    const colors = {
                        'GONDOR':'#4169E1','ROHAN':'#228B22','MORDOR':'#8B0000','ISENGARD':'#6A0DAD',
                        'HIGH_ELF':'#DAA520','WOOD_ELF':'#2E8B57','LOTHLORIEN':'#FFD700',
                        'DOL_GULDUR':'#4B0082','DALE':'#CD853F','DUNLAND':'#8B4513',
                        'RHUDAUR':'#696969','RANGER_NORTH':'#4682B4','BREE':'#A0522D',
                        'HOBBIT':'#7CFC00','DORWINION':'#D2691E','NEAR_HARAD':'#B8860B',
                        'ANGMAR':'#2F4F4F','GUNDABAD':'#778899','DURINS_FOLK':'#B8860B',
                        'FANGORN':'#228B22','BLUE_MOUNTAINS':'#4682B4','WIND_MOUNTAINS':'#708090',
                        'TAURETHRIM':'#006400','MORWAITH':'#8B7355','LOSSOTH':'#ADD8E6',
                        'RED_MOUNTAINS':'#B22222','HALF_TROLL':'#8B008B','FACELESS':'#363636',
                        'UTUMNO':'#1C1C1C'
                    };
                    const wpGroup = L.featureGroup();
                    data.forEach(wp => {
                        const c = colors[wp.f] || '#aaa';
                        const icon = L.divIcon({
                            className: 'wp-icon',
                            html: '<div style="width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.8);background:'+c+';box-shadow:0 0 4px '+c+';"></div>',
                            iconSize: [10, 10],
                            iconAnchor: [5, 5]
                        });
                        const m = L.marker(wp.ll, {icon});
                        m.bindPopup('<b style="color:'+c+'">'+wp.n+'</b><br><small>'+wp.f+' · MC: '+wp.mc[0]+', '+wp.mc[1]+'</small><br>'+wp.d);
                        m.addTo(wpGroup);
                    });
                    wpGroup.addTo(map);
                    console.log('Loaded '+data.length+' waypoints');
                })
                .catch(e => console.error('Failed to load waypoints:', e));
        }
        loadWaypoints();

</script>
    <script>
        // Faction data
        const FACTIONS = [
            { id: 'GONDOR', name: 'Гондор', color: '#1e3a5f' },
            { id: 'ROHAN', name: 'Рохан', color: '#2d5016' },
            { id: 'MORDOR', name: 'Мордор', color: '#4a0e0e' },
            { id: 'ISENGARD', name: 'Изенгард', color: '#2d2d2d' },
            { id: 'HIGH_ELF', name: 'Высшие эльфы', color: '#4a4a8a' },
            { id: 'WOOD_ELF', name: 'Лесное королевство', color: '#3d5c2e' },
            { id: 'LOTHLORIEN', name: 'Лотлориэн', color: '#c9a227' },
            { id: 'DOL_GULDUR', name: 'Дол Гулдур', color: '#2d1a4a' },
            { id: 'DALE', name: 'Дейл', color: '#5c4a1e' },
            { id: 'DUNLAND', name: 'Дунланд', color: '#4a3a2a' },
            { id: 'RHUDAUR', name: 'Рудаур', color: '#3a3a4a' },
            { id: 'RANGER_NORTH', name: 'Арнор', color: '#2a3a3a' },
            { id: 'BREE', name: 'Бри', color: '#5c5c3a' },
            { id: 'HOBBIT', name: 'Хоббиты', color: '#4a5c2a' },
            { id: 'DORWINION', name: 'Дорвинион', color: '#5c2a4a' },
            { id: 'NEAR_HARAD', name: 'Ближний Харад', color: '#8b4a1a' },
            { id: 'ANGMAR', name: 'Ангмар', color: '#3a3a5c' },
            { id: 'GUNDABAD', name: 'Гундабад', color: '#4a4a3a' },
            { id: 'DURINS_FOLK', name: 'Народ Дурина', color: '#5c5c5c' },
            { id: 'FANGORN', name: 'Фангорн', color: '#2d4a2a' }
        ];

        // Minecraft to Tile conversion
        // Assuming Minecraft world is mapped to tiles at zoom 3
        // Center of Middle-earth approximately at Minecraft coords 32000, -16000
        const MC_CENTER_X = 32000;
        const MC_CENTER_Y = -16000;
        const MC_SCALE = 0.0001; // Scale factor for conversion

        // State
        let markers = [];
        let editMode = false;
        let map;
        let leafletMarkers = {};
        let pendingPopup = null;

        // Initialize
        function init() {
            initMap();
            loadMarkers();
            setupEventListeners();
            updateMarkersList();
        }

        function initMap() {
            // Initialize Leaflet map centered on Middle-earth
            // Using approximate center: lat 0, lng 0 for the tile system
            map = L.map('map', {
                crs: L.CRS.Simple,
                minZoom: 1,
                maxZoom: 5,
                zoomControl: false
            }).setView([-51.90625, 88.28125], 4);

            // Move zoom control to top-right
            L.control.zoom({
                position: 'topright'
            }).addTo(map);

            // Add tile layer
            L.tileLayer('https://maplotr.enchald.com/tiles/{z}_{x}_{y}.png', {
                attribution: 'Enchald LOTR Server',
                minZoom: 1,
                maxZoom: 5,
                noWrap: true
            }).addTo(map);

            // Map click handler for edit mode
            map.on('click', function(e) {
                if (editMode) {
                    showAddMarkerPopup(e.latlng);
                }
            });
        }

        function showAddMarkerPopup(latlng) {
            const factionOptions = FACTIONS.map(f =>
                `<option value="${f.id}">${f.name}</option>`
            ).join('');

            const popupContent = `
                <div class="popup-title">⚔️ Добавить маркер</div>
                <div class="popup-field">
                    <label>Фракция:</label>
                    <select id="marker-faction">${factionOptions}</select>
                </div>
                <div class="popup-field">
                    <label>Название:</label>
                    <input type="text" id="marker-name" placeholder="Введите название...">
                </div>
                <div class="popup-field">
                    <label>Количество войск:</label>
                    <input type="number" id="marker-troops" placeholder="0" min="0">
                </div>
                <button class="btn-add" id="add-marker-btn">📍 Добавить маркер</button>
                <button class="btn-cancel" id="cancel-marker-btn">Отмена</button>
            `;

            pendingPopup = L.popup()
                .setLatLng(latlng)
                .setContent(popupContent)
                .openOn(map);

            // Setup event listeners for popup buttons
            setTimeout(() => {
                document.getElementById('add-marker-btn')?.addEventListener('click', () => {
                    const factionId = document.getElementById('marker-faction').value;
                    const name = document.getElementById('marker-name').value.trim() || 'Без названия';
                    const troops = parseInt(document.getElementById('marker-troops').value) || 0;

                    addMarker(latlng, factionId, name, troops);
                    pendingPopup?.close();
                    pendingPopup = null;
                });

                document.getElementById('cancel-marker-btn')?.addEventListener('click', () => {
                    pendingPopup?.close();
                    pendingPopup = null;
                });
            }, 100);
        }

        function addMarker(latlng, factionId, name, troops) {
            const marker = {
                id: Date.now().toString(),
                lat: latlng.lat,
                lng: latlng.lng,
                factionId,
                name,
                troops
            };

            markers.push(marker);
            createLeafletMarker(marker);
            saveMarkers();
            updateMarkersList();
        }

        function createLeafletMarker(marker) {
            const faction = FACTIONS.find(f => f.id === marker.factionId);
            const factionClass = faction ? `faction-${faction.id.toLowerCase().replace('_', '-')}` : '';

            // Create custom icon
            const iconHtml = `
                <div class="custom-marker ${factionClass}" style="width: 36px; height: 36px;">
                    ${faction ? faction.id.charAt(0) : '?'}
                    ${marker.troops > 0 ? `<span class="troop-count">${formatTroops(marker.troops)}</span>` : ''}
                </div>
            `;

            const customIcon = L.divIcon({
                html: iconHtml,
                className: 'custom-marker-container',
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            });

            const leafletMarker = L.marker([marker.lat, marker.lng], { icon: customIcon })
                .addTo(map);

            // Add popup with marker info
            const popupContent = `
                <div class="popup-title">${marker.name}</div>
                <div style="text-align: center;">
                    <div style="color: #c9a227; margin-bottom: 5px;">${faction ? faction.name : marker.factionId}</div>
                    <div>⚔️ Войска: ${marker.troops.toLocaleString()}</div>
                    <div style="font-size: 0.75rem; color: #666; margin-top: 5px;">
                        Координаты: ${Math.round(marker.lat)}, ${Math.round(marker.lng)}
                    </div>
                </div>
            `;

            leafletMarker.bindPopup(popupContent);

            leafletMarkers[marker.id] = leafletMarker;
        }

        function formatTroops(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function deleteMarker(id) {
            if (leafletMarkers[id]) {
                map.removeLayer(leafletMarkers[id]);
                delete leafletMarkers[id];
            }
            markers = markers.filter(m => m.id !== id);
            saveMarkers();
            updateMarkersList();
        }

        function clearAllMarkers() {
            if (markers.length === 0) return;

            if (confirm('Вы уверены, что хотите удалить все маркеры?')) {
                Object.values(leafletMarkers).forEach(m => map.removeLayer(m));
                leafletMarkers = {};
                markers = [];
                saveMarkers();
                updateMarkersList();
            }
        }

        function updateMarkersList() {
            const container = document.getElementById('markers-list');

            if (markers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                        </svg>
                        <p>Нет маркеров</p>
                        <p style="font-size: 0.8rem; margin-top: 5px;">Включите режим редактирования и кликните на карту</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = markers.map(marker => {
                const faction = FACTIONS.find(f => f.id === marker.factionId);
                const factionClass = faction ? `faction-${faction.id.toLowerCase().replace('_', '-')}` : '';

                return `
                    <div class="marker-item" data-id="${marker.id}">
                        <div class="marker-header">
                            <div class="faction-icon ${factionClass}">${faction ? faction.id.charAt(0) : '?'}</div>
                            <div class="marker-name">${marker.name}</div>
                            <div class="marker-troops">⚔️ ${formatTroops(marker.troops)}</div>
                        </div>
                        <div class="marker-coords">
                            📍 ${Math.round(marker.lat)}, ${Math.round(marker.lng)} |
                            <span style="color: ${faction?.color}">${faction?.name || marker.factionId}</span>
                        </div>
                        <div class="marker-actions">
                            <button class="btn-delete" onclick="focusMarker('${marker.id}')">👁️ Найти</button>
                            <button class="btn-delete" onclick="deleteMarker('${marker.id}')">🗑️ Удалить</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function focusMarker(id) {
            const marker = markers.find(m => m.id === id);
            if (marker && leafletMarkers[id]) {
                map.setView([marker.lat, marker.lng], 5);
                leafletMarkers[id].openPopup();
            }
        }

        function saveMarkers() {
            localStorage.setItem('lotr-markers', JSON.stringify(markers));
        }

        function loadMarkers() {
            const saved = localStorage.getItem('lotr-markers');
            if (saved) {
                try {
                    markers = JSON.parse(saved);
                    markers.forEach(m => createLeafletMarker(m));
                } catch (e) {
                    console.error('Failed to load markers:', e);
                    markers = [];
                }
            }
        }

        function setupEventListeners() {
            // Edit mode toggle
            document.getElementById('edit-toggle').addEventListener('change', (e) => {
                editMode = e.target.checked;
                const indicator = document.getElementById('edit-indicator');
                indicator.classList.toggle('active', editMode);

                // Change cursor based on mode
                document.getElementById('map').style.cursor = editMode ? 'crosshair' : 'grab';
            });

            // Clear all button
            document.getElementById('clear-all-btn').addEventListener('click', clearAllMarkers);

            // Make functions globally available
            window.deleteMarker = deleteMarker;
            window.focusMarker = focusMarker;
        }

        // Start
        init();
    
        // === WAYPOINTS LOADER ===
        function loadWaypoints() {
            fetch('waypoints.json')
                .then(r => r.json())
                .then(data => {
                    const colors = {
                        'GONDOR':'#4169E1','ROHAN':'#228B22','MORDOR':'#8B0000','ISENGARD':'#6A0DAD',
                        'HIGH_ELF':'#DAA520','WOOD_ELF':'#2E8B57','LOTHLORIEN':'#FFD700',
                        'DOL_GULDUR':'#4B0082','DALE':'#CD853F','DUNLAND':'#8B4513',
                        'RHUDAUR':'#696969','RANGER_NORTH':'#4682B4','BREE':'#A0522D',
                        'HOBBIT':'#7CFC00','DORWINION':'#D2691E','NEAR_HARAD':'#B8860B',
                        'ANGMAR':'#2F4F4F','GUNDABAD':'#778899','DURINS_FOLK':'#B8860B',
                        'FANGORN':'#228B22','BLUE_MOUNTAINS':'#4682B4','WIND_MOUNTAINS':'#708090',
                        'TAURETHRIM':'#006400','MORWAITH':'#8B7355','LOSSOTH':'#ADD8E6',
                        'RED_MOUNTAINS':'#B22222','HALF_TROLL':'#8B008B','FACELESS':'#363636',
                        'UTUMNO':'#1C1C1C'
                    };
                    const wpGroup = L.featureGroup();
                    data.forEach(wp => {
                        const c = colors[wp.f] || '#aaa';
                        const icon = L.divIcon({
                            className: 'wp-icon',
                            html: '<div style="width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.8);background:'+c+';box-shadow:0 0 4px '+c+';"></div>',
                            iconSize: [10, 10],
                            iconAnchor: [5, 5]
                        });
                        const m = L.marker(wp.ll, {icon});
                        m.bindPopup('<b style="color:'+c+'">'+wp.n+'</b><br><small>'+wp.f+' · MC: '+wp.mc[0]+', '+wp.mc[1]+'</small><br>'+wp.d);
                        m.addTo(wpGroup);
                    });
                    wpGroup.addTo(map);
                    console.log('Loaded '+data.length+' waypoints');
                })
                .catch(e => console.error('Failed to load waypoints:', e));
        }
        loadWaypoints();

</script>
</body>
</html>
